<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maestro Cup FC26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-crown">♛</span>
    <div class="brand-text">
      <h1>Maestro Cup</h1>
      <span class="brand-sub">FC26 — Le tournoi ultime des meilleurs clubs</span>
    </div>
  </div>
  <div id="connection-dot" class="connection-dot" title="Connexion en direct"></div>
</header>

<div id="ticker" class="ticker">
  <div class="ticker-inner" id="ticker-inner">
    <span class="ticker-empty">Chargement du direct…</span>
  </div>
</div>

<nav class="tabs">
  <button class="tab-btn active" data-tab="calendrier">Calendrier</button>
  <button class="tab-btn" data-tab="poules">Poules</button>
  <button class="tab-btn" data-tab="finale">Phase finale</button>
  <button class="tab-btn" data-tab="reglement">Règlement</button>
</nav>

<main>

  <section id="tab-calendrier" class="tab-panel active">
    <div class="journee-switch" id="journee-switch"></div>
    <div id="calendrier-content" class="matches-grid"></div>
  </section>

  <section id="tab-poules" class="tab-panel">
    <div class="poules-grid" id="poules-grid"></div>
  </section>

  <section id="tab-finale" class="tab-panel">
    <p class="finale-note" id="finale-note"></p>
    <div class="bracket" id="bracket"></div>
  </section>

  <section id="tab-reglement" class="tab-panel">
    <div class="reglement" id="reglement-content"></div>
  </section>

</main>

<footer class="site-footer">
  <span>Maestro Cup FC26 — mis à jour en direct</span>
</footer>

<script type="module" src="app.js"></script>
</body>
</html>
